replicaCount: 2

image:
  repository: truenorth-engine
  tag: "0.1.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

# Non-secret config.
config:
  # Postgres connection string. Leave empty to fall back to the engine's SQLite default
  # (NOT recommended in a cluster — use a managed Postgres).
  databaseUrl: "postgresql+psycopg://truenorth:truenorth@truenorth-postgres:5432/truenorth"

# Secret values. In real deployments, prefer an existing Secret / external secrets
# manager and set existingSecret instead of inlining these.
secrets:
  anthropicApiKey: ""
  githubToken: ""
  existingSecret: ""

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi

livenessProbe:
  path: /healthz
readinessProbe:
  path: /healthz
