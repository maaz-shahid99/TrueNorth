{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "truenorth-engine.fullname" . }}
  labels:
    {{- include "truenorth-engine.labels" . | nindent 4 }}
type: Opaque
stringData:
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  GITHUB_TOKEN: {{ .Values.secrets.githubToken | quote }}
{{- end }}
