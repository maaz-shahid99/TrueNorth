apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "truenorth-engine.fullname" . }}
  labels:
    {{- include "truenorth-engine.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "truenorth-engine.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "truenorth-engine.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: engine
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
          env:
            - name: DATABASE_URL
              value: {{ .Values.config.databaseUrl | quote }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "truenorth-engine.secretName" . }}
                  key: ANTHROPIC_API_KEY
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "truenorth-engine.secretName" . }}
                  key: GITHUB_TOKEN
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.path }}
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.path }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
